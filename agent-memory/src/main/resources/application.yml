server:
  port: 8088

# gRPC 服务端端口（MemoryService 4 RPC，T10 实现）+ 客户端（调用 agent-model-gateway）
grpc:
  server:
    port: 9088
  client:
    # T4: 调用 agent-model-gateway Chat RPC 做记忆蒸馏（gRPC 端口 9094）
    model-gateway:
      address: static://localhost:9094
      negotiation-type: plaintext

spring:
  application:
    name: agent-memory
  datasource:
    url: jdbc:mysql://localhost:3306/agent_memory?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# Memory 模块配置（对齐 doc 04-memory §13）
memory:
  ttl:
    rawToActive: 0
    activeToDistilled: 7d
    distilledToArchived: 30d
  recall:
    topK: 10
    scoreThreshold: 0.75
  distill:
    triggerCount: 20
  dedup:
    exactThreshold: 1.0
    cosineHigh: 0.95
    cosineLow: 0.85
  milvus:
    enabled: false
    host: localhost
    port: 19530
    collection: agent_memory_vector
  # T4: 模型网关客户端开关（测试环境禁用，避免 gRPC channel 初始化）
  model-gateway:
    enabled: true
