server:
  port: 0

# 测试环境禁用 gRPC 服务端（避免端口占用），gRPC 逻辑由单测直接调用
grpc:
  server:
    port: -1

spring:
  datasource:
    url: jdbc:h2:mem:agent_memory;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

# 测试环境禁用 Milvus
memory:
  milvus:
    enabled: false
  # T4: 测试环境禁用模型网关 gRPC 客户端（避免连接 9094 端口）
  model-gateway:
    enabled: false
