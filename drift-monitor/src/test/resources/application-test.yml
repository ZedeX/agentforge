server:
  port: 0

grpc:
  server:
    port: -1

spring:
  datasource:
    url: jdbc:h2:mem:agent_drift;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

drift:
  detection:
    threshold-slight: 0.3
    threshold-moderate: 0.6
    threshold-severe: 0.8
  correction:
    auto-reset: true
