server:
  port: 8094

# T8: gRPC 服务端端口（ModelGateway 4 RPC）
grpc:
  server:
    port: 9094

spring:
  application:
    name: agent-model-gateway
  datasource:
    url: jdbc:mysql://localhost:3306/agent_model?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

model:
  gateway:
    defaultScene: GENERIC
    failThreshold: 3
    cooldownMinutes: 5
    quota:
      tenant:
        defaultUsd: 100
