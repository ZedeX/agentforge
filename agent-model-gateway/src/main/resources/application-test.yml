server:
  port: 0

# T14: test environment disable gRPC server (avoid port conflicts)
grpc:
  server:
    port: -1

spring:
  datasource:
    url: jdbc:h2:mem:agent_model;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
