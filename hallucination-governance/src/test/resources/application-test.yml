server:
  port: 0

# 测试环境禁用 gRPC 服务端（避免端口占用），gRPC 逻辑由单测直接调用
grpc:
  server:
    port: -1

spring:
  datasource:
    url: jdbc:h2:mem:hallucination_governance_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

# 测试环境配置
hallucination:
  self-check:
    enabled: true
    confidence-threshold: 0.6
  rag-anchor:
    enabled: true
    anchor-score-threshold: 0.5
  tool-guard:
    enabled: true
  hard-validation:
    enabled: true
  metric:
    enabled: true
    retention-days: 30
