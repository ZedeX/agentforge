server:
  port: 8106

# gRPC 服务端端口（HallucinationGovernanceService 4 RPC，F10 实现）
grpc:
  server:
    port: 9106

spring:
  application:
    name: hallucination-governance
  datasource:
    url: jdbc:h2:mem:hallucination_governance;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

# Hallucination 模块配置（对齐 doc 11 F10）
hallucination:
  self-check:
    enabled: true
    confidence-threshold: 0.6
  rag-anchor:
    enabled: true
    anchor-score-threshold: 0.5
  tool-guard:
    enabled: true
  hard-validation:
    enabled: true
  metric:
    enabled: true
    retention-days: 90
