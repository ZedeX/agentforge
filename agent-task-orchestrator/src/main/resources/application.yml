server:
  port: 8084

spring:
  application:
    name: agent-task-orchestrator
  datasource:
    url: jdbc:mysql://localhost:3306/agent_task?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# T5/T7: gRPC server（TaskOrchestrator + PlanningService 共用同一 server）
grpc:
  server:
    port: 9090
    security:
      enabled: false   # 开发期关闭 TLS

logging:
  level:
    com.agent.orchestrator: DEBUG

# T11: RocketMQ 集成（4 Topic: execute/done/state-change/cancel）
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: orchestrator-producer
    send-message-timeout: 5000
  orchestrator:
    topics:
      subtask-execute: task.subtask.execute
      subtask-done: task.subtask.done
      state-change: task.state.change
      subtask-cancel: task.subtask.cancel
    groups:
      orchestrator-consumer: orchestrator-cg
