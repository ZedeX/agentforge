server:
  port: 8096

spring:
  application:
    name: agent-repo
  datasource:
    url: jdbc:mysql://localhost:3306/agent_repo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# T4: gRPC server（doc 00-overview §3.1，HTTP 8096 / gRPC 9098）
grpc:
  server:
    port: 9098
