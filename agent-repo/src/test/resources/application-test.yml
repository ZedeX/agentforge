server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:agent_repo;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# T4: 测试中禁用 gRPC server（避免端口占用与 @DataJpaTest 冲突）
grpc:
  server:
    port: -1
