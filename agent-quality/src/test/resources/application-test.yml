server:
  port: 0

# 测试环境禁用 gRPC 服务端（避免端口占用），gRPC 逻辑由单测直接调用
grpc:
  server:
    port: -1

spring:
  datasource:
    url: jdbc:h2:mem:agent_quality_test;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

quality:
  l4:
    consistency-threshold: 0.75
    audit-threshold: 0.7
    max-retry: 2
  review:
    default-page-size: 20
    severity-threshold: 0.8
  badcase:
    review-threshold: 0.8
    auto-id-prefix: "bc-test-"
  validation:
    default-layers: hard,consistency,audit
