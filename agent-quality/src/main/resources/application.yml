server:
  port: 8100

# gRPC 服务端端口（QualityService 4 RPC，F9 实现）
grpc:
  server:
    port: 9100

spring:
  application:
    name: agent-quality
  datasource:
    url: jdbc:mysql://localhost:3306/agent_quality?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

quality:
  l4:
    consistency-threshold: 0.75
    audit-threshold: 0.7
    max-retry: 2
  review:
    default-page-size: 20
    severity-threshold: 0.8
  badcase:
    review-threshold: 0.8
    auto-id-prefix: "bc-"
  validation:
    default-layers: hard,consistency,audit
