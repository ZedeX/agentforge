# AgentForge CI Pipeline
# Runs on push/PR to main/develop branches
# Executes: mvn clean verify + uploads JaCoCo coverage report
# Resolves FN-003/CI-01 from TDD Audit Report v1

name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

  # Allow manual trigger for ad-hoc validation
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (JDK 17)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for blame/audit

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Docker (for Testcontainers)
        uses: docker/setup-buildx-action@v3

      - name: Show environment
        run: |
          echo "=== Java version ==="
          java -version
          echo "=== Maven version ==="
          mvn -v
          echo "=== Git commit ==="
          git log -1 --pretty=fuller

      - name: Compile (skip tests)
        run: mvn -B -ntp clean compile -DskipTests

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Run integration tests + JaCoCo coverage check
        run: mvn -B -ntp verify

      - name: Aggregate JaCoCo report
        if: always()
        run: mvn -B -ntp jacoco:report-aggregate || true

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: |
            **/target/site/jacoco/
            **/target/jacoco.exec
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 14

      - name: Comment PR with coverage summary (optional)
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: |
            ${{ github.workspace }}/**/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 70
          title: 'JaCoCo Coverage Report'
          update-comment: true
