server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: agent-gateway
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

grpc:
  server:
    port: 9091
    # UT-F1-001: mTLS 双向证书认证配置（生产环境启用）
    # 当前测试阶段仅做协议适配，mTLS 握手不在单测覆盖范围；
    # 部署时取消注释并填写证书路径以强制客户端证书校验。
    # security:
    #   certificateChain: classpath:certs/server.crt
    #   privateKey: classpath:certs/server.key
    #   trustCertCollection: classpath:certs/trusted-clients.crt
    #   clientAuth: REQUIRE
  client:
    task-orchestrator:
      address: static://localhost:9090
      negotiation-type: plaintext
    risk-control:
      address: static://localhost:9092
      negotiation-type: plaintext

session-service:
  base-url: http://localhost:8082

gateway:
  jwt:
    secret: ${JWT_SECRET:}  # R-03: must be injected via env, no hardcoded default
    issuer: "agent-platform"
    ttl-minutes: 60
  api-keys:  # R-01: API Key auth via config, no hardcoded backdoor
    valid-keys: ${API_KEYS:}
    key-to-tenant-id: ${API_KEY_TENANTS:}
  rate-limit:
    capacity: 20
    refill-tokens: 10
    refill-seconds: 1
  auth-whitelist:
    paths:
      - /api/v1/health
      - "POST /api/v1/sessions"
  max-payload:
    max-size: 1MB

logging:
  level:
    com.agent.gateway: DEBUG
    org.springframework.web: INFO
