server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: agent-gateway
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

grpc:
  server:
    port: 9091
    # R-05: mTLS is activated via Spring profile "mtls".
    # See application-mtls.yml for the security block.
    # Dev/Test: no profile → no security → plaintext.
    # Prod: set SPRING_PROFILES_ACTIVE=mtls + cert env vars.
  client:
    task-orchestrator:
      address: ${GRPC_ORCHESTRATOR_ADDR:static://localhost:9090}
      negotiation-type: ${GRPC_NEGOTIATION_TYPE:plaintext}
    risk-control:
      address: ${GRPC_RISK_CONTROL_ADDR:static://localhost:9092}
      negotiation-type: ${GRPC_NEGOTIATION_TYPE:plaintext}

session-service:
  base-url: http://localhost:8082

gateway:
  jwt:
    secret: ${JWT_SECRET:}  # R-03: must be injected via env, no hardcoded default
    issuer: "agent-platform"
    ttl-minutes: 60
  api-keys:  # R-01: API Key auth via config, no hardcoded backdoor
    valid-keys: ${API_KEYS:}
    # key-to-tenant-id is loaded programmatically from API_KEY_TENANTS env
    # (format: ak1=tenant1,ak2=tenant2) — see ApiKeyProperties.postConstruct
  rate-limit:
    capacity: 20
    refill-tokens: 10
    refill-seconds: 1
  auth-whitelist:
    paths:
      - /api/v1/health
      - "POST /api/v1/sessions"
  max-payload:
    max-size: 1MB

logging:
  level:
    com.agent.gateway: DEBUG
    org.springframework.web: INFO
