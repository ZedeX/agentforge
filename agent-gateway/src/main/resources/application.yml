server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: agent-gateway
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

grpc:
  server:
    port: 9091
    # R-05: mTLS enabled — certs injected via env vars
    # Dev: GRPC_CLIENT_AUTH=WANT (allow unauthenticated clients)
    # Prod: GRPC_CLIENT_AUTH=REQUIRE (enforce client certs)
    # Test: GRPC_NEGOTIATION_TYPE=plaintext in @TestConfiguration
    security:
      certificateChain: ${GRPC_SERVER_CERT:classpath:certs/server.crt}
      privateKey: ${GRPC_SERVER_KEY:classpath:certs/server.key}
      trustCertCollection: ${GRPC_CLIENT_CA:classpath:certs/trusted-clients.crt}
      clientAuth: ${GRPC_CLIENT_AUTH:REQUIRE}
  client:
    task-orchestrator:
      address: ${GRPC_ORCHESTRATOR_ADDR:static://localhost:9090}
      negotiation-type: ${GRPC_NEGOTIATION_TYPE:tls}
      security:
        trustCertCollection: ${GRPC_SERVER_CA:classpath:certs/ca.crt}
        clientKey: ${GRPC_CLIENT_KEY:classpath:certs/client.key}
        clientCertChain: ${GRPC_CLIENT_CERT:classpath:certs/client.crt}
    risk-control:
      address: ${GRPC_RISK_CONTROL_ADDR:static://localhost:9092}
      negotiation-type: ${GRPC_NEGOTIATION_TYPE:tls}
      security:
        trustCertCollection: ${GRPC_SERVER_CA:classpath:certs/ca.crt}
        clientKey: ${GRPC_CLIENT_KEY:classpath:certs/client.key}
        clientCertChain: ${GRPC_CLIENT_CERT:classpath:certs/client.crt}

session-service:
  base-url: http://localhost:8082

gateway:
  jwt:
    secret: ${JWT_SECRET:}  # R-03: must be injected via env, no hardcoded default
    issuer: "agent-platform"
    ttl-minutes: 60
  api-keys:  # R-01: API Key auth via config, no hardcoded backdoor
    valid-keys: ${API_KEYS:}
    key-to-tenant-id: ${API_KEY_TENANTS:}
  rate-limit:
    capacity: 20
    refill-tokens: 10
    refill-seconds: 1
  auth-whitelist:
    paths:
      - /api/v1/health
      - "POST /api/v1/sessions"
  max-payload:
    max-size: 1MB

logging:
  level:
    com.agent.gateway: DEBUG
    org.springframework.web: INFO
