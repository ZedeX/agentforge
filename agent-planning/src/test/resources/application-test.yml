server:
  port: 0

grpc:
  server:
    port: -1

spring:
  datasource:
    url: jdbc:h2:mem:agent_planning;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

planning:
  template:
    enabled: true
    min-success-rate: 0.6
  replan:
    max-count: 5
    manual-threshold: 3
