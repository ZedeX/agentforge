<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0f2847"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Connection lines (network topology) -->
  <g opacity="0.15" stroke="#00d4ff" stroke-width="1">
    <line x1="150" y1="180" x2="350" y2="120"/>
    <line x1="150" y1="180" x2="300" y2="280"/>
    <line x1="350" y1="120" x2="550" y2="160"/>
    <line x1="350" y1="120" x2="500" y2="80"/>
    <line x1="550" y1="160" x2="750" y2="120"/>
    <line x1="550" y1="160" x2="700" y2="260"/>
    <line x1="750" y1="120" x2="950" y2="180"/>
    <line x1="750" y1="120" x2="900" y2="80"/>
    <line x1="950" y1="180" x2="1100" y2="140"/>
    <line x1="300" y1="280" x2="500" y2="320"/>
    <line x1="500" y1="320" x2="700" y2="260"/>
    <line x1="700" y1="260" x2="900" y2="300"/>
    <line x1="500" y1="80" x2="700" y2="50"/>
    <line x1="900" y1="80" x2="1050" y2="50"/>
  </g>

  <!-- Glowing connection lines -->
  <g opacity="0.3" stroke="#00d4ff" stroke-width="1.5" filter="url(#blur)">
    <line x1="150" y1="180" x2="350" y2="120"/>
    <line x1="350" y1="120" x2="550" y2="160"/>
    <line x1="550" y1="160" x2="750" y2="120"/>
    <line x1="750" y1="120" x2="950" y2="180"/>
    <line x1="300" y1="280" x2="500" y2="320"/>
    <line x1="500" y1="320" x2="700" y2="260"/>
  </g>

  <!-- Node dots (agent nodes) -->
  <g filter="url(#glow-filter)">
    <circle cx="150" cy="180" r="6" fill="#00d4ff" opacity="0.9"/>
    <circle cx="350" cy="120" r="8" fill="#00d4ff" opacity="0.9"/>
    <circle cx="550" cy="160" r="10" fill="#00e5ff" opacity="0.95"/>
    <circle cx="750" cy="120" r="8" fill="#00d4ff" opacity="0.9"/>
    <circle cx="950" cy="180" r="6" fill="#00d4ff" opacity="0.9"/>
    <circle cx="300" cy="280" r="5" fill="#4dd0e1" opacity="0.8"/>
    <circle cx="500" cy="320" r="5" fill="#4dd0e1" opacity="0.8"/>
    <circle cx="700" cy="260" r="7" fill="#00d4ff" opacity="0.85"/>
    <circle cx="900" cy="300" r="5" fill="#4dd0e1" opacity="0.8"/>
    <circle cx="500" cy="80" r="4" fill="#80deea" opacity="0.7"/>
    <circle cx="700" cy="50" r="4" fill="#80deea" opacity="0.7"/>
    <circle cx="900" cy="80" r="4" fill="#80deea" opacity="0.7"/>
    <circle cx="1100" cy="140" r="5" fill="#4dd0e1" opacity="0.8"/>
    <circle cx="1050" cy="50" r="4" fill="#80deea" opacity="0.7"/>
  </g>

  <!-- Center glow orb -->
  <ellipse cx="600" cy="200" rx="200" ry="100" fill="#00d4ff" opacity="0.03"/>
  <ellipse cx="600" cy="200" rx="100" ry="50" fill="#00d4ff" opacity="0.05"/>

  <!-- Title -->
  <text x="600" y="195" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">AgentForge</text>

  <!-- Subtitle -->
  <text x="600" y="235" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="18" fill="#4dd0e1" text-anchor="middle" letter-spacing="6" opacity="0.9">ENTERPRISE MULTI-AGENT ORCHESTRATION PLATFORM</text>

  <!-- Bottom accent line -->
  <rect x="450" y="255" width="300" height="1.5" fill="url(#glow)" opacity="0.6"/>

  <!-- Feature tags -->
  <g font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="11" fill="#80deea" opacity="0.7" text-anchor="middle">
    <text x="380" y="295">DAG Orchestration</text>
    <text x="520" y="295">Three-Tier Memory</text>
    <text x="680" y="295">Tool Governance</text>
    <text x="820" y="295">Hallucination Defense</text>
  </g>

  <!-- Decorative corner elements -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.2">
    <polyline points="20,20 20,50" fill="none"/>
    <polyline points="20,20 50,20" fill="none"/>
    <polyline points="1180,20 1180,50" fill="none"/>
    <polyline points="1180,20 1150,20" fill="none"/>
    <polyline points="20,380 20,350" fill="none"/>
    <polyline points="20,380 50,380" fill="none"/>
    <polyline points="1180,380 1180,350" fill="none"/>
    <polyline points="1180,380 1150,380" fill="none"/>
  </g>
</svg>
