server:
  port: 8098

# T11: gRPC 服务端端口（KnowledgeService 4 新 RPC）
grpc:
  server:
    port: 9098

spring:
  application:
    name: agent-knowledge
  datasource:
    url: jdbc:mysql://localhost:3306/agent_knowledge?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# T10: Milvus + Embedding configuration
knowledge:
  milvus:
    enabled: false
    host: localhost
    port: 19530
  embedding:
    http-enabled: false
    endpoint: http://localhost:8094/v1/embeddings
