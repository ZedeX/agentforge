server:
  port: 0

# 测试环境关闭 gRPC server（port=-1）+ 不连接外部 gRPC 服务
grpc:
  server:
    port: -1

spring:
  datasource:
    url: jdbc:h2:mem:agent_runtime_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

# 测试环境关闭所有 gRPC 客户端（避免实际连接 agent-model-gateway / agent-tool-engine / agent-memory）
runtime:
  model-gateway-client:
    enabled: false
  tool-engine-client:
    enabled: false
  memory-client:
    enabled: false
  react:
    max-steps: 20
    token-budget: 32000
    token-yellow-threshold: 0.6
    token-red-threshold: 0.8
  reflexion:
    interval: 3
  circuit:
    model:
      failure-threshold: 5
      open-duration-ms: 30000
    tool:
      failure-threshold: 3
      open-duration-ms: 30000
  retry:
    max-attempts: 3
    initial-backoff-ms: 200
    multiplier: 3.0
