server:
  port: 0

# 测试环境禁用 gRPC 服务端（避免端口占用）
grpc:
  server:
    port: -1

spring:
  datasource:
    url: jdbc:h2:mem:agent_tool;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

# 测试环境禁用 Docker 沙箱 + Redis 连接 + Memory gRPC 客户端
tool:
  docker:
    enabled: false
  cache:
    enabled: false
  approval:
    enabled: false
  memory-client:
    enabled: false
