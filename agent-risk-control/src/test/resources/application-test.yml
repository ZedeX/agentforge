server:
  port: 0

grpc:
  server:
    port: -1

spring:
  datasource:
    url: jdbc:h2:mem:agent_risk_control;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

risk-control:
  content:
    sensitive-words:
      - "敏感词1"
      - "敏感词2"
    enable-pii-detection: true
    enable-injection-detection: true
  permission:
    default-action: deny
  audit:
    enabled: true
