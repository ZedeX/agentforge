# ServiceAccount per service (for Vault K8s auth + RBAC).
# Apply: kubectl apply -f 01-serviceaccounts.yaml
#
# Vault K8s auth binds each SA to a Vault role via:
#   vault write auth/kubernetes/role/agent-platform-<svc> \
#     bound_service_account_names=<svc>-sa \
#     bound_service_account_namespaces=agent-platform-prod \
#     policies=agent-platform-<svc> ttl=1h
# (See infra/vault/vault-seeds.sh)
#
# R-04 Security hardening:
#   - Removed Group-level RoleBinding that gave all SAs list access to ALL secrets
#   - Split into per-SA RoleBinding with restricted permissions:
#     * secrets: get own secret only (no list)
#     * configmaps: get + list (non-sensitive)
#     * pods: get only (for health checks)

# ---- Role: read configmaps + get own secret + get pods ----
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-platform-config-reader
  namespace: agent-platform-prod
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-platform-self-secret-reader
  namespace: agent-platform-prod
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    # resourceNames is set per-SA below to restrict to own secret only

