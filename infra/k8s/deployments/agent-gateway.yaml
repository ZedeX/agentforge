# agent-gateway Deployment (doc 09 §13.2 + §14.3).
# HPA target if applicable (see infra/k8s/hpa/).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-gateway
  namespace: agent-platform-prod
  labels:
    app: agent-gateway
    tier: gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agent-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: agent-gateway
        tier: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /actuator/prometheus
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: agent-gateway-sa
      terminationGracePeriodSeconds: 60
      containers:
        - name: agent-gateway
          image: agentplatform/agent-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # Spring Boot needs /tmp; set true + emptyDir tmpfs for hardening
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_APPLICATION_NAME
              value: agent-gateway
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: HOSTNAME_HASH
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: SW_AGENT_NAME
              value: agent-platform-agent-gateway
            - name: SW_COLLECTOR_BACKEND_SERVICE
              value: skywalking-oap.agent-platform-infra:11800
            - name: JAVA_OPTS
              value: "-Xms768m -Xmx1536m"
          envFrom:
            - configMapRef:
                name: agent-platform-bootstrap
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - "sleep 10 && curl -X POST http://localhost:8080/actuator/shutdown || true"
          volumeMounts:
            - name: bootstrap
              mountPath: /app/config
              readOnly: true
            - name: heapdump
              mountPath: /var/log/agent-platform
      volumes:
        - name: bootstrap
          configMap:
            name: agent-platform-bootstrap
        - name: heapdump
          emptyDir: {}