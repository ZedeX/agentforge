# agent-memory Service (ClusterIP).
---
apiVersion: v1
kind: Service
metadata:
  name: agent-memory
  namespace: agent-platform-prod
spec:
  type: ClusterIP
  selector:
    app: agent-memory
  ports:
        - name: http
          port: 8088
          targetPort: 8088
          protocol: TCP
        - name: grpc
          port: 9088
          targetPort: 9088
          protocol: TCP