# agent-quality Service (ClusterIP).
---
apiVersion: v1
kind: Service
metadata:
  name: agent-quality
  namespace: agent-platform-prod
spec:
  type: ClusterIP
  selector:
    app: agent-quality
  ports:
        - name: http
          port: 8100
          targetPort: 8100
          protocol: TCP
        - name: grpc
          port: 9100
          targetPort: 9100
          protocol: TCP