# Shared governance rules (COMMON_GROUP).
# Hallucination + drift + cost + rate-limit + sampling thresholds.
# Aligned with doc 09 §1.3 (hallucination) + §2.2.3 (drift) + §3.4 (cost).
governance:
  hallucination:
    enabled: true
    layers: [L1, L2, L3, L4, L5, L6]
    alert-threshold:
      daily-rate-warning: 0.05
      daily-rate-critical: 0.10
  drift:
    detection-enabled: true
    alert-threshold:
      task-level: 0.3
      system-level: 0.5
      critical: 0.7
    weekly-full-regression: true
  cost:
    circuit-breaker:
      task-warn-ratio: 0.8
      task-block-ratio: 1.0
      tenant-daily-limit-cent: 10000000
  rate-limit:
    tenant-qps: 100
    user-qps: 20
  sampling:
    online-eval-rate: 0.01
    badcase-auto-collect: true
